<app-container-principal>
    <div class="equipes-container">
        <section class="top-row">
            <div class="heading-copy">
                <h1>Gestao de equipes</h1>
                <p>Cadastre equipes, organize membros e mantenha as modalidades atualizadas.</p>
            </div>
        </section>

        <app-cadastrar-equipe-card
            [equipeEditando]="equipeEditando"
            (equipeAdicionada)="onEquipeAdicionada($event)"
            (equipeAtualizada)="onEquipeAtualizada($event)"
            (cancelarEdicao)="equipeEditando = null">
        </app-cadastrar-equipe-card>

        <section class="list-section">
            <div class="section-heading">
                <div>
                    <h2>Equipes Registradas</h2>
                </div>

                <span class="pill pill-neutral">{{ equipes.length }} Ativas</span>
            </div>

            <div class="teams-list">
                @for (equipe of equipes; track equipe.id) {
                    <app-equipe-card
                        [equipe]="equipe"
                        (equipeEditada)="iniciarEdicao($event)"
                        (equipeRemovida)="onEquipeRemovida($event)">
                    </app-equipe-card>
                }
            </div>
        </section>
    </div>
</app-container-principal>
