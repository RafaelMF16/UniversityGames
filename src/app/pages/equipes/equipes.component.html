<app-container-principal>
    <div class="equipes-container">
        <section class="top-row">
            <div class="heading-copy">
                <h1>Gestao de equipes</h1>
                <p>Cadastre equipes, organize membros e mantenha as modalidades atualizadas.</p>
            </div>
        </section>

        @if (error()) {
            <div class="pill pill-warning feedback-pill">{{ error() }}</div>
        }

        <app-cadastrar-equipe-card
            [equipeEditando]="equipeEditando()"
            [salvando]="formSaving() || (equipeEditando() !== null && updatingId() === equipeEditando()?.id)"
            (equipeAdicionada)="onEquipeAdicionada($event)"
            (equipeAtualizada)="onEquipeAtualizada($event)"
            (cancelarEdicao)="cancelarEdicao()">
        </app-cadastrar-equipe-card>

        <section class="list-section">
            <div class="section-heading">
                <div>
                    <h2>Equipes Registradas</h2>
                </div>

                <span class="pill pill-neutral">{{ equipes().length }} Ativas</span>
            </div>

            @if (carregandoLista()) {
                <app-loading-indicator label="Carregando equipes..."></app-loading-indicator>
            } @else {
                <div class="teams-list">
                    @for (equipe of equipes(); track equipe.id) {
                        <app-equipe-card
                            [equipe]="equipe"
                            [salvando]="updatingId() === equipe.id"
                            [removendo]="deletingId() === equipe.id"
                            (equipeEditada)="iniciarEdicao($event)"
                            (equipeAtualizada)="onEquipeCardAtualizada($event)"
                            (equipeRemovida)="onEquipeRemovida($event)">
                        </app-equipe-card>
                    } @empty {
                        <app-loading-indicator label="Nenhuma equipe cadastrada." [inline]="true"></app-loading-indicator>
                    }
                </div>
            }
        </section>
    </div>
</app-container-principal>
