<app-container-principal>
    <div class="equipes-container">
        <section class="top-row">
            <div class="heading-copy">
                <h1>Gestao de Equipes</h1>
                <p>Gerencie os participantes dos Jogos Internos FPM 2024.</p>
            </div>

            <button class="app-button" type="button">+ Novo Registro</button>
        </section>

        <app-cadastrar-equipe-card (equipeAdicionada)="onEquipeAdicionada($event)"></app-cadastrar-equipe-card>

        <section class="list-section">
            <div class="section-heading">
                <div>
                    <h2>Equipes Registradas</h2>
                </div>

                <span class="pill pill-neutral">{{ equipes.length }} Ativas</span>
            </div>

            <div class="teams-list">
                @for (equipe of equipes; track equipe.id) {
                    <app-equipe-card
                        [equipe]="equipe"
                        (equipeEditada)="onEquipeEditada($event)"
                        (equipeRemovida)="onEquipeRemovida($event)">
                    </app-equipe-card>
                }
            </div>
        </section>
    </div>
</app-container-principal>
