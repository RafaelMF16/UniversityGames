<app-container-principal>
    <div class="ver-confrontos-container">
        <section class="hero-row">
            <div class="hero-icon">🏆</div>
            <div>
                <h1>Match Schedule</h1>
                <p>Season 2024 • Phase 1</p>
            </div>
        </section>

        <div class="tabs-row">
            @for (aba of abas; track aba.id) {
                <button class="tab-button" type="button" [class.active]="abaAtiva === aba.id" (click)="abaAtiva = aba.id">
                    {{ aba.label }}
                </button>
            }
        </div>

        <app-filtros-card
            [equipes]="equipes"
            [modalidades]="modalidades"
            [locais]="locais"
            (filtrosChange)="atualizarFiltros($event)">
        </app-filtros-card>

        <div class="confrontos-grid">
            @for (confronto of confrontosFiltrados; track confronto.id) {
                <app-confronto-card [confronto]="confronto"></app-confronto-card>
            } @empty {
                <p class="vazio">Nenhum confronto encontrado para os filtros atuais.</p>
            }
        </div>

        <div class="load-more-row">
            <button class="app-button-secondary" type="button">Load More Matches</button>
        </div>
    </div>
</app-container-principal>
