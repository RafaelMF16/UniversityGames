<app-container-principal>
    <div class="confrontos-container">
        <section class="page-copy">
            <div>
                <h1>Confrontos</h1>
                <p>Gerencie toda a agenda de partidas em uma única tela.</p>
            </div>

            @if (podeGerenciarConfrontos()) {
                <button class="app-button" type="button" (click)="abrirModalConfronto()" [disabled]="loading()">
                    Cadastrar confronto
                </button>
            }
        </section>

        @if (error()) {
            <div class="pill pill-warning feedback-pill">{{ error() }}</div>
        }

        <app-confrontos-lista-card
            [confrontos]="confrontos()"
            [equipes]="nomesEquipes()"
            [modalidades]="modalidades"
            [carregando]="loading()"
            (filtrosAlterados)="onFiltrosAlterados($event)"
            (verDetalhesClicado)="onVerDetalhes($event)">
        </app-confrontos-lista-card>

        <app-pagination-controls
            [page]="pagination().page"
            [pageSize]="pagination().pageSize"
            [total]="pagination().total"
            [totalPages]="pagination().totalPages"
            [loading]="loading()"
            (pageChange)="onPageChange($event)">
        </app-pagination-controls>
    </div>
</app-container-principal>
