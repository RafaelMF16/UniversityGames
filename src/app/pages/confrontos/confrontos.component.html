<app-container-principal>
    <div class="confrontos-container">
        <section class="page-copy">
            <div>
                <h1>Confrontos</h1>
                <p>Gerencie toda a agenda de partidas em uma unica tela.</p>
            </div>

            <button class="app-button" type="button" (click)="abrirModalConfronto()">Cadastrar confronto</button>
        </section>

        <app-confrontos-lista-card
            [confrontos]="confrontos"
            [equipes]="nomesEquipes"
            [modalidades]="modalidades"
            [locais]="locais"
            (editarConfrontoClicado)="abrirModalConfronto($event)"
            (editarPlacarClicado)="abrirDialogPlacar($event)"
            (confrontoRemovido)="onConfrontoRemovido($event)">
        </app-confrontos-lista-card>
    </div>
</app-container-principal>
