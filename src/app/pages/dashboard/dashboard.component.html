<app-container-principal>
    <div class="dashboard-container">
        <section class="hero">
            <span class="eyebrow">Resumo</span>
            <h1 class="title">Painel geral</h1>
            <p>Acompanhe as inscrições e os próximos jogos do evento em uma visão rápida e direta.</p>
        </section>

        @if (error()) {
            <div class="pill pill-warning feedback-pill">{{ error() }}</div>
        }

        @if (loading() && !proximosJogos().length) {
            <app-loading-indicator label="Carregando dashboard..."></app-loading-indicator>
        } @else {
            <app-dashboard-metrics-strip [items]="metricas()"></app-dashboard-metrics-strip>

            <section class="matches-section">
                <div class="section-heading">
                    <div>
                        <h2>Próximos jogos</h2>
                        <p>Agenda enxuta das partidas mais próximas do cronograma.</p>
                    </div>
                </div>

                <app-dashboard-upcoming-table [confrontos]="proximosJogos()"></app-dashboard-upcoming-table>
            </section>
        }
    </div>
</app-container-principal>
