<app-container-principal>
    <div class="dashboard-container">
        <section class="hero">
            <div class="section-heading">
                <div>
                    <h1 class="title">Painel Geral</h1>
                    <p>Acompanhe o desempenho e os proximos jogos da temporada.</p>
                </div>
            </div>
        </section>

        <div class="card-container">
            @for (metrica of metricas; track metrica.titulo) {
                <app-dashboard-card
                    [titulo]="metrica.titulo"
                    [valor]="metrica.valor"
                    [icone]="metrica.icone"
                    [destaque]="metrica.destaque"
                    [destaqueTipo]="metrica.destaqueTipo"
                    [descricao]="metrica.descricao">
                </app-dashboard-card>
            }
        </div>

        <section class="matches-section">
            <div class="section-heading">
                <div>
                    <h2>Proximos Jogos</h2>
                    <p>Visao rapida das partidas mais proximas do cronograma.</p>
                </div>
            </div>

            <div class="matches-grid">
                @for (confronto of proximosJogos; track confronto.equipeA + confronto.equipeB) {
                    <app-proximos-confrontos-card [confronto]="confronto"></app-proximos-confrontos-card>
                }
            </div>
        </section>
    </div>
</app-container-principal>
