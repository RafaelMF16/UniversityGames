<section class="confirm-card surface-card">
    <div class="confirm-copy">
        <span class="eyebrow">Confirmacao</span>
        <h2>{{ data.titulo }}</h2>
        <p>{{ data.mensagem }}</p>
    </div>

    <div class="actions">
        <button class="app-button-ghost" type="button" (click)="cancelar()">
            {{ data.cancelarTexto || 'Cancelar' }}
        </button>
        <button class="app-button-danger" type="button" (click)="confirmar()">
            {{ data.confirmarTexto || 'Excluir' }}
        </button>
    </div>
</section>
