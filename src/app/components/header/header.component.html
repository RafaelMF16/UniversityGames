<header class="header">
    <div class="header-left">
        <button class="menu-button" type="button" aria-label="Abrir menu lateral" (click)="abrirMenuLateral()">
            <mat-icon>menu</mat-icon>
        </button>

        <div class="brand">
            <a class="brand-link" routerLink="/dashboard">
                <span class="brand-main">Jogos internos</span>
            </a>
        </div>
    </div>

    <div class="actions">
        <button class="profile-button" type="button" aria-label="Perfil do usuario" (click)="toggleMenu($event)">
            <mat-icon>person</mat-icon>
        </button>

        @if (menuAberto()) {
            <div class="profile-menu surface-card">
                <div class="profile-copy">
                    <strong>{{ nomeUsuario() }}</strong>
                    <span>Perfil: {{ perfilLabel() }}</span>
                </div>

                <button class="theme-toggle" type="button" (click)="alternarTema()">
                    <mat-icon>{{ temaAplicado() === 'dark' ? 'dark_mode' : 'light_mode' }}</mat-icon>
                    <span>{{ temaLabel() }}</span>
                </button>

                @if (isVisitor()) {
                    <button class="menu-link" type="button" (click)="entrar()">Entrar</button>
                } @else {
                    <button class="menu-link danger-link" type="button" (click)="sair()">Sair</button>
                }
            </div>
        }
    </div>
</header>
