<header class="header">
    <div class="brand">
        <a class="brand-link" routerLink="/dashboard">
            <span class="brand-main">JOGOS INTERNOS</span>
            <span class="brand-accent">FPM</span>
        </a>
    </div>

    <nav class="nav">
        <a
            class="nav-link"
            routerLink="/dashboard"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }">
            Dashboard
        </a>
        <a class="nav-link" routerLink="/equipes" routerLinkActive="active">Equipes</a>
        <a class="nav-link" routerLink="/confrontos" routerLinkActive="active">Confrontos</a>
    </nav>

    <div class="actions">
        <button class="profile-button" type="button" aria-label="Perfil do usuario">
            <mat-icon>person</mat-icon>
        </button>
    </div>
</header>
