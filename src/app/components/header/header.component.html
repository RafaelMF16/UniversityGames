<header class="header">
    <div class="brand">
        <a class="brand-link" routerLink="/dashboard">
            <span class="brand-main">JOGOS INTERNOS</span>
            <span class="brand-accent">FPM</span>
        </a>
    </div>

    <nav class="nav">
        <a
            class="nav-link"
            routerLink="/dashboard"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }">
            Dashboard
        </a>
        <a class="nav-link" routerLink="/equipes" routerLinkActive="active">Equipes</a>
        <a class="nav-link" routerLink="/confrontos" routerLinkActive="active">Confrontos</a>
    </nav>

    <div class="actions">
        <button class="profile-button" type="button" aria-label="Perfil do usuario" (click)="toggleMenu($event)">
            <mat-icon>person</mat-icon>
        </button>

        @if (menuAberto()) {
            <div class="profile-menu surface-card">
                <div class="profile-copy">
                    <strong>{{ nomeUsuario() }}</strong>
                    <span>Perfil: {{ perfilLabel() }}</span>
                </div>

                @if (podeGerenciarUsuarios()) {
                    <a class="menu-link" routerLink="/usuarios" (click)="fecharMenu()">Gerenciar usuarios</a>
                }

                @if (isVisitor()) {
                    <button class="menu-link" type="button" (click)="entrar()">Entrar</button>
                } @else {
                    <button class="menu-link danger-link" type="button" (click)="sair()">Sair</button>
                }
            </div>
        }
    </div>
</header>
