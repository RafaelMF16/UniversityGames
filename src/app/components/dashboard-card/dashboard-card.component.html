<mat-card class="card" appearance="outlined">
    <mat-card-content class="card-content">
        <div class="icone-wrapper">
            <mat-icon>{{ icone }}</mat-icon>
        </div>
        <div class="info">
            <span class="titulo">{{ titulo }}</span>
            <span class="valor">{{ valor }}</span>
        </div>
    </mat-card-content>
</mat-card>
