<article class="card surface-card">
    <div class="card-copy">
        <span class="eyebrow">{{ titulo }}</span>
        <strong class="valor">{{ valor }}</strong>

        @if (destaque || descricao) {
            <div class="meta">
                @if (destaque) {
                    <span class="meta-highlight" [class.success]="destaqueTipo === 'success'" [class.warning]="destaqueTipo === 'warning'">
                        {{ destaque }}
                    </span>
                }
                @if (descricao) {
                    <span class="descricao">{{ descricao }}</span>
                }
            </div>
        }
    </div>

    <div class="icone-wrapper">
        <mat-icon>{{ icone }}</mat-icon>
    </div>
</article>
