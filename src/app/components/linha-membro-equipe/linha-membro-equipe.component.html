<article class="membro-card">
    <div class="member-copy">
        <span class="eyebrow">{{ membro.funcao || 'Membro' }}</span>
        <strong>{{ membro.nome }}</strong>

        <div class="chips">
            @for (hab of membro.habilidades; track hab) {
                <span class="chip">{{ hab }}</span>
            }
        </div>
    </div>

    @if (podeRemover) {
        <button class="icon-btn" type="button" (click)="membroRemovido.emit(membro.id)" aria-label="Remover membro">
            <mat-icon>delete</mat-icon>
        </button>
    }
</article>
