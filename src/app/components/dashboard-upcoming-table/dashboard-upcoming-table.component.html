<section class="upcoming-cards">
    @for (confronto of confrontos(); track confronto.id) {
        <article class="match-card surface-card">
            <div class="match-card__top">
                <span class="pill pill-neutral">{{ modalidadeLabel(confronto.modalidade) }}</span>
                <span class="match-time">{{ formatarData(confronto.data) }} · {{ confronto.horario }}</span>
            </div>

            <div class="match-card__copy">
                <h3>{{ confronto.equipeA }} <span>vs</span> {{ confronto.equipeB }}</h3>
                <p>{{ confronto.local }}</p>
            </div>

            <a class="app-button-secondary match-action" [routerLink]="['/confrontos', confronto.id]">
                Ver detalhes
            </a>
        </article>
    } @empty {
        <div class="surface-card empty-state">
            Nenhum confronto disponível.
        </div>
    }
</section>
