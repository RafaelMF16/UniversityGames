<section class="card surface-card" [class.expanded]="expandido">
    <div class="summary-row">
        <div class="identity">
            <div class="copy">
                <h3>{{ equipe.nome }}</h3>
                <p>{{ equipe.modalidade }} • Responsavel: {{ equipe.responsavel }} • {{ equipe.membros.length }} membros</p>
            </div>
        </div>

        <div class="actions">
            <button class="icon-btn" type="button" (click)="equipeEditada.emit(equipe)" aria-label="Editar equipe">
                <mat-icon>edit</mat-icon>
            </button>
            <button class="icon-btn danger" type="button" (click)="equipeRemovida.emit(equipe.id)" aria-label="Excluir equipe">
                <mat-icon>delete</mat-icon>
            </button>
            <button class="expand-btn" type="button" (click)="expandido = !expandido" aria-label="Expandir equipe">
                <mat-icon>{{ expandido ? 'expand_less' : 'expand_more' }}</mat-icon>
            </button>
        </div>
    </div>

    @if (expandido) {
        <div class="members-panel">
            <div class="members-grid">
                @for (membro of equipe.membros; track membro.id) {
                    <app-linha-membro-equipe [membro]="membro" (membroRemovido)="onMembroRemovido($event)"></app-linha-membro-equipe>
                }
            </div>

            @if (!adicionandoMembro) {
                <button class="app-button-ghost add-member-button" type="button" (click)="adicionandoMembro = true">
                    <mat-icon>person_add</mat-icon>
                    Adicionar membro
                </button>
            } @else {
                <div class="member-form surface-card">
                    <div class="field-group">
                        <label for="novo-membro-{{ equipe.id }}">Nome do membro</label>
                        <input
                            id="novo-membro-{{ equipe.id }}"
                            class="app-input"
                            [(ngModel)]="novoNome"
                            placeholder="Nome completo">
                    </div>

                    <div class="field-group">
                        <label>Habilidades</label>
                        <div class="skills">
                            @for (habilidade of habilidadesDisponiveis; track habilidade) {
                                <button
                                    class="skill-chip"
                                    type="button"
                                    [class.active]="novasHabilidades.includes(habilidade)"
                                    (click)="toggleHabilidade(habilidade)">
                                    {{ habilidade }}
                                </button>
                            }
                        </div>
                    </div>

                    <div class="member-form-actions">
                        <button class="app-button-secondary" type="button" (click)="confirmarMembro()">Confirmar membro</button>
                        <button class="app-button-ghost" type="button" (click)="adicionandoMembro = false">Cancelar</button>
                    </div>
                </div>
            }
        </div>
    }
</section>
