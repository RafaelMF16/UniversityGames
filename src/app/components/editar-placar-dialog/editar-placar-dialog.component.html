<section class="dialog surface-card">
    <div class="dialog-header">
        <div>
            <h2>Editar Placar</h2>
            <p>{{ data.equipeA }} x {{ data.equipeB }}</p>
        </div>

        <button class="icon-btn" type="button" (click)="fechar()" aria-label="Fechar dialogo">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="placar">
        <div class="time">
            <span class="time-nome">{{ data.equipeA }}</span>
            <input class="score-input" type="number" [(ngModel)]="golsA" min="0">
        </div>

        <span class="x">x</span>

        <div class="time">
            <span class="time-nome">{{ data.equipeB }}</span>
            <input class="score-input" type="number" [(ngModel)]="golsB" min="0">
        </div>
    </div>

    <div class="dialog-acoes">
        <button class="app-button-ghost" type="button" (click)="fechar()">Cancelar</button>
        <button class="app-button-secondary" type="button" (click)="salvar()">Salvar Placar</button>
    </div>
</section>
