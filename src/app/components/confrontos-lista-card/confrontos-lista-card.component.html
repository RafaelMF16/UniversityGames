<div class="card">
    <div class="tabela-header">
        <span class="col-equipe">Equipe A</span>
        <span class="col-equipe">Equipe B</span>
        <span class="col-placar">Placar</span>
        <span class="col-data">Data</span>
        <span class="col-horario hide-mobile">Horário</span>
        <span class="col-local hide-mobile">Local</span>
        <span class="col-acoes">Ações</span>
    </div>

    @for (confronto of confrontos; track confronto.id) {
        <div class="confronto-row">
            <span class="col-equipe">{{ confronto.equipeA }}</span>
            <span class="col-equipe">{{ confronto.equipeB }}</span>
            <span class="col-placar" [class.com-placar]="temPlacar(confronto)">
                {{ placar(confronto) }}
            </span>
            <span class="col-data">{{ confronto.data }}</span>
            <span class="col-horario hide-mobile">{{ confronto.horario }}</span>
            <span class="col-local hide-mobile">{{ confronto.local }}</span>
            <div class="col-acoes acoes-btns">
                <button class="icon-btn" (click)="editarPlacarClicado.emit(confronto)" title="Editar placar">
                    <span class="material-icons trophy">emoji_events</span>
                </button>
                <button class="icon-btn" (click)="editarConfrontoClicado.emit(confronto)" title="Editar">
                    <span class="material-icons edit">edit</span>
                </button>
                <button class="icon-btn" (click)="confrontoRemovido.emit(confronto.id)" title="Remover">
                    <span class="material-icons delete">delete</span>
                </button>
            </div>
        </div>
    }
</div>
