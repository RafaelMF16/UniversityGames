<div class="pagination" [class.disabled]="loading || itemsCount === 0">
    <div class="copy">
        @if (itemsCount > 0) {
            <span>Página {{ page }} · {{ itemsCount }} item(ns) carregado(s)</span>
        } @else {
            <span>Nenhum item para exibir</span>
        }
    </div>

    <div class="controls">
        <button class="nav-btn" type="button" (click)="goToPrevious()" [disabled]="loading || page <= 1">Anterior</button>
        <span class="page-copy">{{ pageSize }} por página</span>
        <button class="nav-btn" type="button" (click)="goToNext()" [disabled]="loading || !hasNext">Próxima</button>
    </div>
</div>
