<article class="card surface-card">
    <div class="teams-row">
        <div class="team-block">
            <strong>{{ confronto.equipeA }}</strong>
        </div>

        <div class="center-block">
            <span class="vs">VS</span>
            <span class="time">{{ horarioLabel() }}</span>
            <span class="date">{{ confronto.data }}</span>
        </div>

        <div class="team-block">
            <strong>{{ confronto.equipeB }}</strong>
        </div>
    </div>

    <div class="footer-row">
        <span class="location">
            <mat-icon>location_on</mat-icon>
            {{ confronto.local }}
        </span>

        <span class="pill pill-neutral">{{ modalidadeLabel() }}</span>
    </div>
</article>
