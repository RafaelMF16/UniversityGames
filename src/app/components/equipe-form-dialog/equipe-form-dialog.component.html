<app-cadastrar-equipe-card
    [categoria]="data.categoria"
    [equipeEditando]="data.equipeEditando"
    [modalidadesDisponiveis]="data.modalidadesDisponiveis"
    [usuarioAtual]="data.usuarioAtual"
    [individualAutopreenchido]="data.individualAutopreenchido"
    [modalidadesIndividuaisBloqueadas]="data.modalidadesIndividuaisBloqueadas"
    [equipesReferencia]="data.equipesReferencia"
    [salvando]="formSaving()"
    (equipeAdicionada)="onEquipeAdicionada($event)"
    (equipeAtualizada)="onEquipeAtualizada($event)"
    (cancelarEdicao)="onCancelarEdicao()">
</app-cadastrar-equipe-card>
