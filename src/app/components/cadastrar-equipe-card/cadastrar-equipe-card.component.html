<section class="card surface-card">
    <div class="card-header">
        <div class="card-title-wrap">
            <span class="title-icon">+</span>
            <h2>Cadastrar Equipe</h2>
        </div>
    </div>

    <div class="form-grid">
        <div class="field-group">
            <label for="nome-equipe">Nome da equipe</label>
            <input id="nome-equipe" class="app-input" [(ngModel)]="nome" placeholder="Ex: Time Alfa" type="text">
        </div>

        <div class="field-group">
            <label for="responsavel-equipe">Responsavel</label>
            <input id="responsavel-equipe" class="app-input" [(ngModel)]="responsavel" placeholder="Nome completo" type="text">
        </div>

        <div class="field-group">
            <label for="email-equipe">E-mail de contato</label>
            <input id="email-equipe" class="app-input" [(ngModel)]="email" placeholder="contato@equipe.com" type="email">
        </div>
    </div>

    <div class="actions">
        <button class="app-button-secondary" type="button" (click)="cadastrar()">Salvar Equipe</button>
    </div>
</section>
