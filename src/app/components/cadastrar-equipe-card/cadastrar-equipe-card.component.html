<mat-card class="card">
    <mat-card-title>
        <p>Cadastrar Equipe</p>
    </mat-card-title>

    <mat-card-content class="form">
        <input class="input"  placeholder="Nome da equipe" type="text">
        <input class="input"  placeholder="Responsável" type="text">
        <input class="input"  placeholder="Email" type="email">
    </mat-card-content>

    <button mat-flat-button color="primary" (click)="cadastrar()">
        Cadastrar
    </button>
</mat-card>
