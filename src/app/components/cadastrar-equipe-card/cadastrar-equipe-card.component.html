<mat-card class="card">
    <mat-card-title>
        <p>Cadastrar Equipe</p>
    </mat-card-title>

    <mat-card-content class="form">
        <input class="input" [(ngModel)]="nome" placeholder="Nome da equipe" type="text">
        <input class="input" [(ngModel)]="responsavel" placeholder="Responsável" type="text">
        <input class="input" [(ngModel)]="email" placeholder="Email" type="email">
    </mat-card-content>

    <button mat-flat-button color="primary" (click)="cadastrar()">
        Cadastrar
    </button>
</mat-card>
